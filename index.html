<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NFC Console Master</title>
    <style>
        /* Correção do Viewport: Removido o 100vh falho */
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: monospace; touch-action: none; }
        
        /* Ancoramento Absoluto: Força o jogo a caber exatamente no espaço que sobrou da tela */
        #game-container { position: absolute; top: 0; bottom: 0; left: 0; right: 0; z-index: 1; }
        
        #tap-screen { 
            position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #000; color: #fff; z-index: 9999; cursor: pointer;
        }
        
        .pulse { animation: pulse 1.5s infinite; color: #e52521; margin-top: 20px; font-size: 1.2rem; text-transform: uppercase;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        #error-msg { color: #ff4444; padding: 20px; text-align: center; }

        /* Estilo do Botão de Resgate de UX */
        #rescue-btn {
            display: none; position: absolute; top: 15px; right: 15px; z-index: 9999;
            background: rgba(229, 37, 33, 0.8); color: white; border: 1px solid #fff; 
            padding: 10px 15px; border-radius: 8px; font-weight: bold; font-family: monospace; cursor: pointer;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5); backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <!-- Botão de UX (Só aparece se perder a tela cheia) -->
    <button id="rescue-btn">RESTAURAR TELA CHEIA</button>

    <div id="game-container"></div>
    <div id="tap-screen">
        <h2>HARDWARE RECONHECIDO</h2>
        <div class="pulse">Toque para iniciar calibração</div>
    </div>

    <script>
        const gameLibrary = {
            'mario': { core: 'snes', rom: 'roms/smw.smc', name: 'Super Mario World' },
            'sonick': { core: 'segaMD', rom: 'roms/sonic.md', name: 'Sonic 3' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        const tapScreen = document.getElementById('tap-screen');
        const rescueBtn = document.getElementById('rescue-btn');

        // Função universal para forçar tela cheia
        function goFullscreen() {
            const elem = document.documentElement;
            if (elem.requestFullscreen) { elem.requestFullscreen(); }
            else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); }
            else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }
        }

        // Listener que monitora a queda da Tela Cheia
        function monitorFullscreen() {
            const isFull = document.fullscreenElement || document.webkitFullscreenElement;
            // Se não estiver em tela cheia (o usuário puxou a barra) E a tela de tap já sumiu, exibe o botão
            if (!isFull && tapScreen.style.display === 'none') {
                rescueBtn.style.display = 'block';
            } else {
                rescueBtn.style.display = 'none';
            }
        }

        // Atrela o monitoramento aos eventos nativos dos navegadores
        document.addEventListener('fullscreenchange', monitorFullscreen);
        document.addEventListener('webkitfullscreenchange', monitorFullscreen); // Para iOS

        // Ação do Botão de Resgate
        rescueBtn.addEventListener('click', goFullscreen);

        if (!gameId || !gameLibrary[gameId]) {
            tapScreen.innerHTML = '<div id="error-msg">Falha na leitura.</div>';
        } else {
            tapScreen.addEventListener('click', () => {
                
                goFullscreen();
                tapScreen.style.display = 'none';

                setTimeout(() => {
                    const config = gameLibrary[gameId];
                    window.EJS_player = '#game-container'; 
                    window.EJS_core = config.core;
                    window.EJS_gameName = config.name;
                    window.EJS_color = '#e52521'; 
                    window.EJS_startOnLoaded = true; 
                    window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/'; 
                    window.EJS_gameUrl = config.rom; 

                    const script = document.createElement('script');
                    script.src = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js';
                    document.body.appendChild(script);
                }, 500); 
            });
        }
    </script>
</body>
</html>
