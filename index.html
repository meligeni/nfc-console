<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Força comportamento de web app caso o usuário salve na home -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NFC Console</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; font-family: monospace; }
        
        /* O container do jogo fica escondido até o toque */
        #game-container { width: 100%; height: 100%; display: none; }
        
        /* A tela de interceptação */
        #tap-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #000; color: #fff; z-index: 9999; cursor: pointer;
        }
        
        .pulse { animation: pulse 1.5s infinite; color: #e52521; margin-top: 20px; font-size: 1.2rem; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        #error-msg { color: #ff4444; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <!-- Tela que intercepta o toque -->
    <div id="tap-screen">
        <h2>HARDWARE RECONHECIDO</h2>
        <div class="pulse">Toque na tela para dar boot</div>
    </div>

    <!-- Onde o emulador vai injetar o canvas -->
    <div id="game-container"></div>

    <script>
        const gameLibrary = {
            'mario': { core: 'snes', rom: 'roms/smw.smc', name: 'Super Mario World' },
            'sonic': { core: 'segaMD', rom: 'roms/sonick.md', name: 'Sonic The Hedgehog' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        
        const tapScreen = document.getElementById('tap-screen');
        const gameContainer = document.getElementById('game-container');

        if (!gameId || !gameLibrary[gameId]) {
            tapScreen.innerHTML = '<div id="error-msg">Falha na leitura: ROM não mapeada.</div>';
        } else {
            // O evento crucial: aguarda o toque do usuário
            tapScreen.addEventListener('click', () => {
                
                // 1. Invoca a API nativa de Tela Cheia com base no navegador
                const elem = document.documentElement;
                if (elem.requestFullscreen) { elem.requestFullscreen(); }
                else if (elem.webkitRequestFullscreen) { elem.webkitRequestFullscreen(); } // iOS Safari
                else if (elem.msRequestFullscreen) { elem.msRequestFullscreen(); }

                // 2. Transição visual: Some a tela de toque, mostra o emulador
                tapScreen.style.display = 'none';
                gameContainer.style.display = 'block';

                // 3. Injeta a arquitetura do EmulatorJS
                const config = gameLibrary[gameId];
                window.EJS_player = '#game-container';
                window.EJS_core = config.core;
                window.EJS_gameName = config.name;
                window.EJS_color = '#e52521'; 
                window.EJS_startOnLoaded = true; 
                window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/'; 
                window.EJS_gameUrl = config.rom; 

                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js';
                document.body.appendChild(script);
            });
        }
    </script>
</body>
</html>
