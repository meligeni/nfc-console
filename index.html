<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- Força comportamento de web app caso o usuário salve na home -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>NFC Console Mobile Fix</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100vw; height: 100vh; background-color: #000; overflow: hidden; font-family: monospace; }
        
        /* O container do jogo fica escondido até o toque */
        #game-container { width: 100%; height: 100%; display: none; }
        
        /* A tela de interceptação */
        #tap-screen { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background-color: #000; color: #fff; z-index: 9999; cursor: pointer;
        }
        
        .pulse { animation: pulse 1.5s infinite; color: #e52521; margin-top: 20px; font-size: 1.2rem; text-transform: uppercase;}
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
        
        #error-msg { color: #ff4444; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <!-- Tela que intercepta o toque -->
    <div id="tap-screen">
        <h2>HARDWARE RECONHECIDO</h2>
        <div class="pulse">Toque para inicializar vídeo</div>
    </div>

    <!-- Onde o emulador vai injetar o canvas -->
    <div id="game-container"></div>

    <script>
        const gameLibrary = {
            'mario': { core: 'snes', rom: 'roms/smw.smc', name: 'Super Mario World' },
            'sonick': { core: 'segaMD', rom: 'roms/sonick.md', name: 'Sonic & Knuckles' }
        };

        const urlParams = new URLSearchParams(window.location.search);
        const gameId = urlParams.get('game');
        
        const tapScreen = document.getElementById('tap-screen');
        const gameContainer = document.getElementById('game-container');

        if (!gameId || !gameLibrary[gameId]) {
            tapScreen.innerHTML = '<div id="error-msg">Falha na leitura: ROM não mapeada ou tag inválida.</div>';
        } else {
            // Intercepta o toque para garantir Tela Cheia E Vídeo
            tapScreen.addEventListener('click', () => {
                
                // MUDANÇA CRUCIAL: Pedimos tela cheia NO CONTAINER, não na página
                const target = gameContainer; 
                if (target.requestFullscreen) { target.requestFullscreen(); }
                else if (target.webkitRequestFullscreen) { target.webkitRequestFullscreen(); } // iOS Safari
                else if (target.msRequestFullscreen) { target.msRequestFullscreen(); }

                // Transição visual: Some a tela de toque
                tapScreen.style.display = 'none';
                
                // Preparamos o container e forçamos o EmulatorJS a rodar nele
                gameContainer.style.display = 'block';

                const config = gameLibrary[gameId];
                window.EJS_player = '#game-container'; // Linkamos o core ao container já em fullscreen
                window.EJS_core = config.core;
                window.EJS_gameName = config.name;
                window.EJS_color = '#e52521'; 
                window.EJS_startOnLoaded = true; 
                
                // Puxamos os binários pesados de fora
                window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/'; 
                window.EJS_gameUrl = config.rom; 

                // Injeta o script de carregamento
                const script = document.createElement('script');
                script.src = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js';
                document.body.appendChild(script);

                // HACK EXTRA DE COMPATIBILIDADE MOBILE
                // Forçamos o canvas a ocupar a tela inteira com !important logo após o boot
                const styleHack = document.createElement('style');
                styleHack.textContent = `
                    #emulator > canvas { position: fixed !important; top: 0 !important; left: 0 !important; width: 100vw !important; height: 100vh !important; display: block !important; }
                    #emulator { z-index: 1000 !important; }
                `;
                document.head.appendChild(styleHack);
            });
        }
    </script>
</body>
</html>
